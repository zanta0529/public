<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APY 結果顯示</title>
    <link rel="stylesheet" href="./utils/Table.css" />
    <style>
        body {
            font-family: Tahoma, "Microsoft JhengHei", "Microsoft YaHei", "Heiti TC", "sans-serif";
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        a {
            color: #0000ff;
            text-decoration: none;
        }

        a:hover {
            background-color: #ea0000;
            color: #fbfbff;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        #apyContainer thead th {
            background-color: #003d79;
            color: #fff;
            padding: 12px;
        }

        #apyContainer tr:nth-child(even) {
            background: #d2e9ff;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-group label {
            font-weight: bold;
            color: #003d79;
        }

        .filter-group select {
            padding: 8px;
            border: 1px solid #003d79;
            border-radius: 4px;
            background-color: white;
            min-width: 150px;
        }

        button {
            margin-bottom: 20px;
            height: 40px;
            font-size: 16px;
            border: none;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            border-radius: 8px;
            background-color: #007bff;
        }

        .button:hover {
            background-color: #0056b3;
            transform: scale(1.01);
        }

        .button-fetch {
            background-color: rgb(39, 39, 107);
            color: yellow;
            font-size: 16px;
            margin-bottom: 10px;
        }

        #loadingMessage {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgb(156, 6, 6);
            color: yellow;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            table {
                font-size: 14px;
            }

            th,
            td {
                padding: 4px;
            }

            td {
                word-wrap: break-word;
                max-width: 150px;
            }

            th:nth-child(3),
            td:nth-child(3) {
                display: none;
            }

            .filter-container {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group select {
                width: 100%;
            }
        }
    </style>

    <script type="module">
        import * as log from "./utils/log.js";
        import Table from "./utils/Table.js";
        import BlockchainInfo from "./info/BlockchainInfo.js";
        import TokenInfo from "./info/TokenInfo.js";
        import PlatformInfo from "./info/PlatformInfo.js";

        let container;
        let currentData = [];

        function initFilters() {
            const platformSelect = document.getElementById('platformFilter');
            const blockchainSelect = document.getElementById('blockchainFilter');
            const tokenSelect = document.getElementById('tokenFilter');

            // 對平台選項進行排序
            const sortedPlatforms = [...PlatformInfo.platforms]
                .sort((a, b) => a.id.localeCompare(b.id));

            // 對區塊鏈選項進行排序
            const sortedChains = [...BlockchainInfo.chains]
                .sort((a, b) => a.symbol.localeCompare(b.symbol));

            // 對代幣選項進行排序
            const sortedTokens = [...TokenInfo.tokens]
                .sort((a, b) => a.symbol.localeCompare(b.symbol));

            sortedPlatforms.forEach(platform => {
                const option = document.createElement('option');
                option.value = platform.id;
                option.textContent = platform.id;
                platformSelect.appendChild(option);
            });

            sortedChains.forEach(chain => {
                const option = document.createElement('option');
                option.value = chain.symbol;
                option.textContent = chain.symbol;
                blockchainSelect.appendChild(option);
            });

            sortedTokens.forEach(token => {
                const option = document.createElement('option');
                option.value = token.symbol;
                option.textContent = token.symbol;
                tokenSelect.appendChild(option);
            });

            [platformSelect, blockchainSelect, tokenSelect].forEach(select => {
                select.addEventListener('change', applyFilters);
            });
        }

        function applyFilters() {
            const platformValue = document.getElementById('platformFilter').value;
            const blockchainValue = document.getElementById('blockchainFilter').value;
            const tokenValue = document.getElementById('tokenFilter').value;

            const filteredData = currentData.filter(item => {
                const platformMatch = platformValue === '' || item._raw.platform === platformValue;
                const blockchainMatch = blockchainValue === '' || item._raw.chain === blockchainValue;
                const tokenMatch = tokenValue === '' || item._raw.coin === tokenValue;
                return platformMatch && blockchainMatch && tokenMatch;
            });

            container.initializeData(filteredData);
        }

        async function initUI() {
            try {
                log.info("網頁初始化...");
                container = await initTable();
                initFilters();
                log.info("網頁初始化完成");
            } catch (error) {
                log.error("發生錯誤: " + error.message, true);
            }
        }

        async function initTable() {
            const columns = [
                { label: "關注", field: "favorite", sortable: true, align: "alignCenter" },
                { label: "平台", field: "platform", sortable: true, align: "alignLeft" },
                { label: "區塊鏈", field: "chain", sortable: true, align: "alignLeft" },
                { label: "代幣", field: "coin", sortable: true, align: "alignLeft" },
                { label: "APY(%)", field: "apy", sortable: true, align: "alignRight", defaultSortColumn: true },
                { label: "金庫", field: "vault", sortable: true, align: "alignCenter" },
            ];

            return new Table({
                language: "cht",
                container: document.querySelector("#apyContainer"),
                columns,
                search: true,
                rowsPerPage: true,
                navigatorStyle: 1,
            });
        }

        async function loadData() {
            if (!container) {
                log.error("表格尚未初始化");
                return;
            }
            const button = document.getElementById("btnFetch");
            button.disabled = true;

            const loadingMessage = document.getElementById("loadingMessage");
            loadingMessage.style.display = "block";

            container.clearData();

            const tbody = document.querySelector("#apyContainer tbody");
            if (!tbody) {
                return;
            }

            tbody.innerHTML = "";

            try {
                const response = await fetch("/run-check");
                if (!response.ok) throw new Error("無法載入資料");
                const allResults = await response.json();
                currentData = parseData(allResults);
                container.initializeData(currentData);
                applyFilters();
                log.info(`擷取資料完成，總資料數量: ${allResults.length}`);
            } catch (error) {
                log.error(`擷取資料失敗: ${error.message}`, true);
                alert(`擷取資料失敗: ${error.message}`);
            } finally {
                button.disabled = false;
                loadingMessage.style.display = "none";
            }
        }

        function parseData(rawdata) {
            if (!rawdata) {
                log.warn("未接收到任何數據", true);
                return [];
            }

            return rawdata.map(({ favorite, platform, chain, coin, apy, vault, source }) => ({
                favorite: favorite ? "❤️" : "",
                platform: platform
                    ? `<img src="${PlatformInfo.getPlatformIconUrl(platform.trim())}" 
                         title="${platform}" alt="${platform}" width="20px" height="20px" />&nbsp;
                       <a href="${source}" target="_blank">${platform}</a>`
                    : "-",
                chain: chain
                    ? `<img src="${BlockchainInfo.getChainIconUrl(chain.trim())}" 
                         title="${chain}" alt="${chain}" width="20px" height="20px" />&nbsp;
                       <span>${chain}</span>`
                    : "",
                coin: coin
                    ? `<img src="${TokenInfo.getTokenIconUrl(coin.trim())}" 
                         title="${coin}" alt="${coin}" width="20px" height="20px" />&nbsp;
                       <span>${coin}</span>`
                    : "",
                apy: apy ? apy.replaceAll("%", "") : "-",
                vault: vault ? `<a href="${source}" target="_blank">${vault}</a>` : "-",
                _raw: { platform, chain, coin } // 保存原始值用於篩選
            }));
        }

        document.addEventListener("DOMContentLoaded", initUI);
        document.getElementById("btnFetch").addEventListener("click", loadData);
    </script>
</head>

<body>
    <h1>APY Retriever</h1>
    <button id="btnFetch" class="button-fetch" aria-label="重新連線">重新連線</button>

    <div class="filter-container">
        <div class="filter-group">
            <label for="platformFilter">平台：</label>
            <select id="platformFilter">
                <option value="">全部</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="blockchainFilter">區塊鏈：</label>
            <select id="blockchainFilter">
                <option value="">全部</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="tokenFilter">代幣：</label>
            <select id="tokenFilter">
                <option value="">全部</option>
            </select>
        </div>
    </div>

    <div id="apyContainer"></div>
    <div id="loadingMessage">檢查中...</div>
</body>

</html>
