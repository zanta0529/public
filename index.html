<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AES 加密/解密工具</title>
        <style>
            body {
                transition: background-color 0.3s ease;
            }
            body.encrypt-mode {
                background-color: #e6ffe6;
            }
            body.decrypt-mode {
                background-color: #ffe6e6;
            }
            .container {
                max-width: 80%;
                margin: 0 auto;
                padding: 20px;
                font-family: Arial, sans-serif;
                background-color: white;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .option-group {
                display: flex;
                flex-wrap: wrap; /* 允許換行 */
                gap: 10px;
                margin-bottom: 15px;
            }
            .option {
                padding: 10px 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }
            .option.selected {
                background-color: #007bff;
                color: white;
            }
            .input-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
            }
            input[type="text"],
            textarea {
                width: 98%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 16px; /* 調整字體大小 */
            }
            .button-group {
                display: flex;
                flex-direction: column; /* 預設為直排 */
                gap: 10px;
                margin-bottom: 15px;
            }
            button {
                padding: 10px 15px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px; /* 調整字體大小 */
            }
            button:hover {
                background-color: #442901;
                color: yellow;
            }
            .encryptButton {
                width: 100%;
                margin: 20px 0 20px 0;
                background-color: #006400;
            }
            .decryptButton {
                width: 100%;
                margin: 20px 0 20px 0;
                background-color: #8b0000;
            }
            #FunctionEncrypt,
            #FunctionDecrypt {
                background-color: #aaa8a8;
                color: black;
            }
            #FunctionEncrypt.selected,
            #FunctionDecrypt.selected {
                background-color: #ad701f; /* 選中狀態的顏色 */
                color: white;
            }
            .error-message {
                color: red;
            }

            /* 媒體查詢 */
            @media (max-width: 768px) {
                .option {
                    flex: 1 1 48%; /* 每行顯示兩個選項 */
                }

                .button-group {
                    flex-direction: column; /* 小螢幕上直排 */
                }
            }

            @media (min-width: 769px) {
                .button-group {
                    flex-direction: row; /* 大螢幕上橫排 */
                    flex-wrap: wrap; /* 允許換行 */
                }

                /* 按鈕均分空間 */
                /* button {
                    flex: 1;
                } */
            }
        </style>
    </head>
    <body class="encrypt-mode">
        <div class="container">
            <h1>AES 加密/解密工具</h1>

            <div id="mode" class="option-group">
                <div id="FunctionEncrypt" class="option selected" data-value="encrypt">加密模式</div>
                <div id="FunctionDecrypt" class="option" data-value="decrypt">解密模式</div>
            </div>

            <div class="input-group">
                <label for="text">Text</label>
                <div class="button-group">
                    <button onclick="copyText('text')">複製</button>
                    <button onclick="pasteText('text')">貼上</button>
                    <button onclick="clearText('text')">清除</button>
                </div>
                <textarea id="text" rows="6"></textarea>
            </div>

            <div class="input-group">
                <label for="secretKey">Secret Key</label>
                <input type="text" id="secretKey" />
                <label id="msgKeyError" class="error-message"></label>
            </div>

            <label>Encryption Key Size</label>
            <div id="keySize" class="option-group">
                <div class="option selected" data-value="128">128 bits</div>
                <div class="option" data-value="192">192 bits</div>
                <div class="option" data-value="256">256 bits</div>
            </div>

            <label>Encryption Mode</label>
            <div id="encryptionMode" class="option-group">
                <div class="option selected" data-value="ECB">ECB</div>
                <div class="option" data-value="CBC">CBC</div>
            </div>

            <div id="ivGroup" class="input-group">
                <label for="iv">Inivial Vector (Optional)</label>
                <input type="text" id="iv" />
                <label id="msgIVError" class="error-message"></label>
            </div>

            <label>Output Format</label>
            <div id="outputFormat" class="option-group">
                <div class="option selected" data-value="base64">Base64</div>
                <div class="option" data-value="hex">Hex</div>
            </div>

            <div class="button-group">
                <button onclick="processData()">加密</button>
            </div>

            <div class="input-group">
                <label for="result">Result</label>
                <div class="button-group">
                    <button onclick="copyText('result')">複製</button>
                    <button onclick="clearText('result')">清除</button>
                    <button onclick="swapText()">交換</button>
                    <button onclick="resetForm()">重置</button>
                </div>
                <textarea id="result" rows="6" readonly></textarea>
            </div>

            <div id="status"></div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => document.getElementById("FunctionEncrypt")?.click());

            /**
             * Toggle the visibility and value of the IV input field based on the currently selected encryption mode.
             * If the mode is ECB, the IV field is hidden and its value is cleared. Otherwise, the IV field is shown and
             * its value is restored to its original value.
             */
            function toggleIV() {
                const isECB = document.querySelector("#encryptionMode .selected").dataset.value === "ECB";
                document.getElementById("iv").value = isECB ? "" : document.getElementById("iv").value;
                document.getElementById("ivGroup").hidden = isECB;
            }

            document.querySelectorAll(".option-group").forEach((group) => {
                group.addEventListener("click", (e) => {
                    const selectedOption = e.target.closest(".option");
                    if (selectedOption) {
                        group.querySelectorAll(".option").forEach((opt) => opt.classList.remove("selected"));
                        selectedOption.classList.add("selected");
                        toggleIV();
                        if (group.id === "mode") {
                            const mode = selectedOption.dataset.value;
                            document.body.className = mode === "encrypt" ? "encrypt-mode" : "decrypt-mode";
                            const processButton = document.querySelector('button[onclick="processData()"]');
                            processButton.textContent = mode === "encrypt" ? "加密" : "解密";
                            processButton.classList.toggle("encryptButton", mode === "encrypt");
                            processButton.classList.toggle("decryptButton", mode === "decrypt");
                        }
                    }
                });
            });

            /**
             * Copy the text of an element to the clipboard by selecting the element and calling the
             * document.execCommand("copy") method.
             *
             * @param {string} id - the id of the element to copy
             */
            function copyText(id) {
                const element = document.getElementById(id);
                element.select();
                document.execCommand("copy");
            }

            /**
             * Paste the text in the clipboard to the element with the given id by reading the clipboard text with
             * navigator.clipboard.readText() and setting the element's value to the read text.
             *
             * @param {string} id - the id of the element to paste the text into
             */
            function pasteText(id) {
                navigator.clipboard.readText().then((text) => (document.getElementById(id).value = text));
            }

            /**
             * Clear the text of the element with the given id.
             *
             * @param {string} id - the id of the element to clear
             */
            function clearText(id) {
                document.getElementById(id).value = "";
            }

            /**
             * Swap the text of the "text" and "result" elements.
             * Useful for testing the decryption process after encrypting a text.
             */
            function swapText() {
                const text = document.getElementById("text").value;
                document.getElementById("text").value = document.getElementById("result").value;
                document.getElementById("result").value = text;
                document.getElementById("status").textContent = "已交換原始文字與加（解）密文字";
            }

            /**
             * Clear the text of all elements with id "msgKeyError", "msgIVError", "result", and "status".
             * This is useful for clearing the error messages after a successful encryption or decryption.
             */
            function clearAllText() {
                document.querySelectorAll("#msgKeyError, #msgIVError #result #status").forEach((element) => {
                    element.textContent = "";
                });
            }

            /**
             * Reset the form by clearing all textareas and inputs, and clearing all error messages,
             * and then reset the encryption mode and key size to their default values.
             */
            function resetForm() {
                document.querySelectorAll("textarea, input[type='text']").forEach((input) => (input.value = ""));
                clearAllText();
                document.querySelectorAll(".option-group .option.selected").forEach((option) => option.click());
            }

            /**
             * Validate the secret key length.
             * If the length of the secret key is not equal to the required length, return an error message.
             * Otherwise, return null.
             *
             * @param {string} secretKey - the secret key to validate
             * @param {number} keySize - the required key size in bits
             * @returns {?string} the error message if the length is invalid, or null if the length is valid
             */
            function validateSecretKey(secretKey, keySize) {
                const requiredLength = keySize / 8; // bits to bytes
                if (secretKey.length !== requiredLength) {
                    return `* Secret Key 的字串長度必須為 ${requiredLength} 字元（${keySize} bits），目前長度為 ${secretKey.length} 字元`;
                }
                return null;
            }

            /**
             * Validate the Initial Vector length.
             * If the length of the Initial Vector is not equal to the expected length, return an error message.
             * Otherwise, return null.
             *
             * @param {string} iv - the Initial Vector to validate
             * @returns {?string} the error message if the length is invalid, or null if the length is valid
             */
            function validateInitialVector(iv) {
                const expectedLength = 16;
                if (iv.length !== expectedLength) {
                    return `* Initial Vector 的字串長度必須為 ${expectedLength} 字元，目前長度為 ${iv.length} 字元`;
                }
                return null;
            }

            /**
             * Display the given error message in the element with the given id.
             *
             * @param {string} message - the error message to display
             * @param {string} elementId - the id of the element to display the error message in
             */
            function displayError(message, elementId) {
                const element = document.getElementById(elementId);
                if (element) element.textContent = message;
            }

            /**
             * Process the data according to the selected mode (encrypt or decrypt), using the given
             * parameters.
             *
             * @param {string} mode - the mode to use, either "encrypt" or "decrypt"
             * @param {string} text - the text to encrypt or decrypt
             * @param {string} secretKey - the secret key to use for encryption or decryption
             * @param {number} keySize - the size of the secret key in bits
             * @param {string} encryptionMode - the encryption mode to use, either "ECB" or "CBC"
             * @param {string} iv - the Initial Vector to use for encryption or decryption
             * @param {string} outputFormat - the format of the output, either "base64" or "hex"
             * @returns {void}
             */
            function processData() {
                const mode = document.querySelector("#mode .selected").dataset.value;
                const text = document.getElementById("text").value;
                const secretKey = document.getElementById("secretKey").value;
                const keySize = parseInt(document.querySelector("#keySize .selected").dataset.value);
                const encryptionMode = document.querySelector("#encryptionMode .selected").dataset.value;
                const iv = document.getElementById("iv").value;
                const outputFormat = document.querySelector("#outputFormat .selected").dataset.value;

                // 清空訊息
                clearAllText();

                // 驗證 Secret Key 長度
                const keyError = validateSecretKey(secretKey, keySize);
                if (keyError) {
                    displayError(keyError, "msgKeyError");
                    return;
                }

                try {
                    const key = CryptoJS.enc.Utf8.parse(secretKey);
                    const ivParam = CryptoJS.enc.Utf8.parse(iv);
                    const config = {
                        keySize: keySize / 32,
                        mode: CryptoJS.mode[encryptionMode],
                        padding: CryptoJS.pad.Pkcs7,
                    };

                    if (encryptionMode !== "ECB") {
                        config.iv = ivParam;

                        // 驗證 Initial Vector 長度
                        const ivError = validateInitialVector(iv);
                        if (ivError) {
                            displayError(ivError, "msgIVError");
                            return;
                        }
                    }

                    const result =
                        mode === "encrypt"
                            ? CryptoJS.AES.encrypt(text, key, config)
                            : CryptoJS.AES.decrypt(
                                  outputFormat === "base64" ? text : { ciphertext: CryptoJS.enc.Hex.parse(text) },
                                  key,
                                  config
                              ).toString(CryptoJS.enc.Utf8);

                    document.getElementById("result").value =
                        mode === "encrypt"
                            ? outputFormat === "base64"
                                ? result.toString()
                                : result.ciphertext.toString()
                            : result;
                    document.getElementById("status").textContent = `${mode === "encrypt" ? "加密" : "解密"}成功`;
                } catch (error) {
                    document.getElementById("status").textContent = `錯誤: ${error.message}`;
                    console.error(error);
                }
            }
        </script>
    </body>
</html>
