<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AES 加密/解密工具 v2</title>
        <style>
            body {
                transition: background-color 0.3s ease;
            }
            body.encrypt-mode {
                background-color: #e6ffe6;
            }
            body.decrypt-mode {
                background-color: #ffe6e6;
            }
            .container {
                max-width: 80%;
                margin: 0 auto;
                padding: 20px;
                font-family: Arial, sans-serif;
                background-color: white;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .option-group {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-bottom: 15px;
            }
            .option {
                padding: 10px 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }
            .option.selected {
                background-color: #007bff;
                color: white;
            }
            .option.disabled {
                pointer-events: none; /* 禁用點擊事件 */
                opacity: 0.5; /* 改變透明度 */
                cursor: not-allowed; /* 更改鼠標指標 */
            }
            .input-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
            }
            input[type="text"],
            textarea {
                width: 98%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 16px;
            }
            .button-group {
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 15px;
            }
            button {
                padding: 10px 15px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
            }
            button:hover {
                background-color: #442901;
                color: yellow;
            }
            .encryptButton {
                width: 100%;
                margin: 20px 0 20px 0;
                background-color: #006400;
            }
            .decryptButton {
                width: 100%;
                margin: 20px 0 20px 0;
                background-color: #8b0000;
            }
            #FunctionEncrypt,
            #FunctionDecrypt {
                background-color: #aaa8a8;
                color: black;
            }
            #FunctionEncrypt.selected,
            #FunctionDecrypt.selected {
                background-color: #ad701f;
                color: white;
            }
            .note {
                color: #464545;
                font-size: 14px;
            }
            .error-message {
                color: red;
            }
            @media (max-width: 768px) {
                .option {
                    flex: 1 1 48%; /* 每行顯示兩個選項 */
                }

                .button-group {
                    flex-direction: column; /* 小螢幕上直排 */
                }
            }

            @media (min-width: 769px) {
                .button-group {
                    flex-direction: row; /* 大螢幕上橫排 */
                    flex-wrap: wrap; /* 允許換行 */
                }

                /* 按鈕均分空間 */
                /* button {
                    flex: 1;
                } */
            }
        </style>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-4KG6DFWZEM"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "G-4KG6DFWZEM");
        </script>
    </head>
    <body class="encrypt-mode">
        <div class="container">
            <h1>AES 加密/解密工具 v2 | <a href="AES_tool_v1.html" class="note">切換至 v1 版本</a></h1>

            <div id="mode" class="option-group">
                <div id="FunctionEncrypt" class="option selected" data-value="encrypt">加密模式</div>
                <div id="FunctionDecrypt" class="option" data-value="decrypt">解密模式</div>
            </div>

            <div class="input-group">
                <label for="text">Text</label>
                <div class="button-group">
                    <button onclick="copyText('text')">複製</button>
                    <button onclick="pasteText('text')">貼上</button>
                    <button onclick="clearText('text')">清除</button>
                </div>
                <textarea id="text" rows="6"></textarea>
            </div>

            <label>Encryption Mode</label>
            <div id="encryptionMode" class="option-group">
                <div class="option selected" data-value="GCM">GCM</div>
                <div class="option" data-value="CBC">CBC</div>
            </div>

            <div id="paddingGroup">
                <label>Padding</label>
                <div id="padding" class="option-group">
                    <div class="option selected" data-value="Pkcs7">PKCS7Padding</div>
                    <div class="option" data-value="NoPadding">NoPadding</div>
                </div>
            </div>

            <label>Encryption Key Size</label>
            <div id="keySize" class="option-group">
                <div class="option selected" data-value="128">128 bits</div>
                <div class="option" data-value="192">192 bits</div>
                <div class="option" data-value="256">256 bits</div>
            </div>

            <div class="input-group">
                <label for="secretKey">Secret Key</label>
                <input type="text" id="secretKey" />
                <label id="msgKeyError" class="error-message"></label>
            </div>

            <div id="ivGroup" class="input-group">
                <label for="iv">Initial Vector</label>
                <input type="text" id="iv" />
                <label id="msgIVError" class="error-message"></label>
            </div>

            <div id="tagLengthGroup" class="input-group" style="display: none">
                <label for="tagLength">Tag Length</label>
                <div id="tagLength" class="option-group">
                    <div class="option selected" data-value="128">128</div>
                    <div class="option" data-value="120">120</div>
                    <div class="option" data-value="112">112</div>
                    <div class="option" data-value="104">104</div>
                    <div class="option" data-value="96">96</div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="processData()">加密</button>
            </div>

            <div class="input-group">
                <label for="result">Result</label>
                <div class="button-group">
                    <button onclick="copyText('result')">複製</button>
                    <button onclick="clearText('result')">清除</button>
                    <button onclick="swapText()">交換</button>
                    <button onclick="resetForm()">重置</button>
                </div>
                <textarea id="result" rows="6" readonly></textarea>
            </div>

            <div id="status"></div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("FunctionEncrypt").click();
                toggleUI();
            });

            function toggleUI() {
                const encryptionMode = document.querySelector("#encryptionMode .selected").dataset.value;
                // const paddingMode = document.querySelector("#padding .selected").dataset.value;
                const ivInput = document.getElementById("iv");
                const tagLengthGroup = document.getElementById("tagLengthGroup");
                const mode = document.querySelector("#mode .selected").dataset.value;
                const processButton = document.querySelector('button[onclick="processData()"]');
                processButton.textContent = mode === "encrypt" ? "加密" : "解密";
                processButton.classList.toggle("encryptButton", mode === "encrypt");
                processButton.classList.toggle("decryptButton", mode === "decrypt");

                switch (encryptionMode) {
                    case "GCM":
                        alterOptionState("NoPadding", "selected", "padding");
                        alterOptionState("Pkcs7", "disabled", "padding");
                        ivInput.setAttribute("maxlength", 16);
                        tagLengthGroup.style.display = "block";
                        break;
                    case "CBC":
                        alterOptionState("Pkcs7", "selected", "padding");
                        alterOptionState("NoPadding", "disabled", "padding");
                        ivInput.setAttribute("maxlength", 16);
                        tagLengthGroup.style.display = "none";
                        break;
                    default:
                        alert(`Unkown encryption mode: '${encryptionMode}'`);
                        break;
                }

                document.body.className = mode === "encrypt" ? "encrypt-mode" : "decrypt-mode";
            }

            async function processData() {
                const mode = document.querySelector("#mode .selected").dataset.value;
                const padding = document.querySelector("#padding .selected").dataset.value;
                const text = document.getElementById("text").value;
                const secretKey = document.getElementById("secretKey").value;
                const keySize = parseInt(document.querySelector("#keySize .selected").dataset.value);
                const encryptionMode = document.querySelector("#encryptionMode .selected").dataset.value;
                const iv = document.getElementById("iv").value;
                const tagLength = document.querySelector("#tagLength .selected").dataset.value;
                const apiModeName = `AES-${encryptionMode}`;

                // 清空訊息
                document.getElementById("msgKeyError").textContent = "";
                document.getElementById("msgIVError").textContent = "";
                document.getElementById("status").textContent = "";

                // 驗證 Secret Key 長度
                const keyError = validateSecretKey(secretKey, keySize);
                if (keyError) {
                    displayError(keyError, "msgKeyError");
                    return;
                }

                // 驗證 Initial Vector 長度
                let ivError;
                switch (encryptionMode) {
                    case "GCM":
                        ivError = validateInitialVector(iv);
                        if (ivError) {
                            displayError(ivError, "msgIVError");
                            return;
                        }
                        break;

                    case "CBC":
                        ivError = validateInitialVector(iv);
                        if (ivError) {
                            displayError(ivError, "msgIVError");
                            return;
                        }
                        break;

                    case "ECB":
                        break;

                    default:
                        break;
                }

                try {
                    const key = await window.crypto.subtle.importKey(
                        "raw",
                        new TextEncoder().encode(secretKey),
                        { name: apiModeName },
                        false,
                        ["encrypt", "decrypt"]
                    );

                    let ivBuffer = new TextEncoder().encode(iv);
                    let result;

                    const algorithm = {
                        name: apiModeName,
                        iv: ivBuffer,
                    };
                    // 在 GCM 模式中設置標籤長度
                    if (encryptionMode === "GCM") {
                        algorithm.tagLength = tagLength;
                    }

                    if (mode === "encrypt") {
                        result = await window.crypto.subtle.encrypt(algorithm, key, new TextEncoder().encode(text));
                        document.getElementById("result").value = arrayBufferToBase64(result);
                        document.getElementById("status").textContent = "加密成功";
                    } else {
                        const decryptedData = new Uint8Array(base64ToArrayBuffer(text));
                        result = await window.crypto.subtle.decrypt(algorithm, key, decryptedData);
                        document.getElementById("result").value = new TextDecoder().decode(result);
                        document.getElementById("status").textContent = "解密成功";
                    }
                } catch (error) {
                    document.getElementById("status").textContent = `錯誤: ${error.message}`;
                    console.error(error);
                }
            }

            function arrayBufferToBase64(buffer) {
                let binary = "";
                const bytes = new Uint8Array(buffer);
                const len = bytes.byteLength;
                for (let i = 0; i < len; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return window.btoa(binary);
            }

            function base64ToArrayBuffer(base64) {
                const binaryString = window.atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return bytes.buffer;
            }

            document.querySelectorAll(".option-group").forEach((group) => {
                group.addEventListener("click", (e) => {
                    const selectedOption = e.target.closest(".option");
                    if (selectedOption) {
                        group.querySelectorAll(".option").forEach((opt) => opt.classList.remove("selected"));
                        selectedOption.classList.add("selected");

                        if (group.id === "mode" || group.id === "encryptionMode") {
                            toggleUI();
                        }
                    }
                });
            });

            function alterOptionState(value, state, elementId) {
                const options = document.querySelectorAll("#" + elementId + " .option");
                options.forEach((option) => {
                    option.classList.remove("disabled"); // 移除 disabled 類別
                    option.classList.remove(state);
                    if (option.getAttribute("data-value") === value) {
                        option.classList.add(state);
                    }
                });

                // // 清除已選擇的類
                // const options = document.querySelectorAll("#" + elementId + " .option");
                // options.forEach((option) => {
                //     option.classList.remove("disabled");
                //     option.classList.remove("selected");
                // });

                // // 將 NoPadding 設定為選中
                // const theOption = Array.from(options).find((option) => option.dataset.value === value);
                // if (theOption) {
                //     theOption.classList.add(state);
                // }
            }

            function addPkcs7Padding(data) {
                const blockSize = 16; // AES 的塊大小是 16 字節
                const paddingSize = blockSize - (data.length % blockSize);
                const padding = new Uint8Array(paddingSize).fill(paddingSize);
                return new Uint8Array([...data, ...padding]);
            }

            function removePkcs7Padding(data) {
                const paddingSize = data[data.length - 1]; // 最後一個字節是填充大小
                return data.subarray(0, data.length - paddingSize); // 去掉填充
            }

            function copyText(id) {
                const element = document.getElementById(id);
                element.select();
                document.execCommand("copy");
            }

            function pasteText(id) {
                navigator.clipboard.readText().then((text) => (document.getElementById(id).value = text));
            }

            function clearText(id) {
                document.getElementById(id).value = "";
            }

            function swapText() {
                const text = document.getElementById("text").value;
                document.getElementById("text").value = document.getElementById("result").value;
                document.getElementById("result").value = text;
                document.getElementById("status").textContent = "已交換原始文字與加（解）密文字";
            }

            function resetForm() {
                document.querySelectorAll("textarea, input[type='text']").forEach((input) => (input.value = ""));
                document.getElementById("msgKeyError").textContent = "";
                document.getElementById("msgIVError").textContent = "";
                document.getElementById("status").textContent = "";
                document.querySelectorAll(".option-group .option.selected").forEach((option) => option.click());
            }

            function validateSecretKey(secretKey, keySize) {
                const requiredLength = keySize / 8; // bits to bytes
                if (secretKey.length !== requiredLength) {
                    return `* Secret Key 的字串長度必須為 ${requiredLength} 字元（${keySize} bits），目前長度為 ${secretKey.length} 字元`;
                }
                return null;
            }

            function validateInitialVector(iv, expectedLength = 16) {
                if (iv.length !== expectedLength) {
                    return `* Initial Vector 的字串長度必須為 ${expectedLength} 字元，目前長度為 ${iv.length} 字元`;
                }
                return null;
            }

            function displayError(message, elementId) {
                const element = document.getElementById(elementId);
                if (element) element.textContent = message;
            }
        </script>
    </body>
</html>
