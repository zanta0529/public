<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>網站檢查（完整版）</title>
        <style>
            body {
                font-family: Tahoma, "Microsoft JhengHei", "Microsoft YaHei", "Heiti TC", "sans-serif";
                margin: 0;
                padding: 10px;
                background-color: #f9f9f9;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            a {
                color: #0000ff;
                text-decoration: none;
            }
            a:hover {
                background-color: #ea0000;
                color: #fbfbff;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 50px;
            }
            th,
            td {
                border: 1px solid #ddd;
                padding: 8px;
                text-align: left;
                cursor: pointer;
            }
            th {
                background-color: #bbabf1;
                position: sticky;
                top: 0;
                z-index: 1;
            }
            button {
                margin-bottom: 20px;
                height: 40px;
                font-size: 16px;
                border: none; /* 移除邊框 */
                color: white; /* 按鈕文字顏色 */
                cursor: pointer; /* 鼠標懸停時顯示為可點擊 */
                transition: background-color 0.3s, transform 0.3s; /* 添加過渡效果 */
                border-radius: 8px; /* 添加圓角 */
            }
            .button-external {
                background-color: #007bff; /* 外網按鈕顏色 */
            }
            .button-internal {
                background-color: #ca8326; /* 內網按鈕顏色 */
            }
            /* 懸停效果 */
            .button-external:hover {
                background-color: #0056b3; /* 外網按鈕懸停顏色 */
                transform: scale(1.01); /* 按鈕放大效果 */
            }
            .button-internal:hover {
                background-color: #6e450e; /* 內網按鈕懸停顏色 */
                transform: scale(1.01); /* 按鈕放大效果 */
            }
            #log {
                margin-top: auto;
                border: 1px solid #ddd;
                padding: 10px;
                background-color: #f9f9f9;
                max-height: 200px;
                overflow-y: auto;
            }
            .status-success {
                background-color: green;
                color: yellow;
                font-weight: bold;
                padding: 5px;
                border-radius: 5px;
            }
            .status-failure {
                background-color: darkred;
                color: yellow;
                font-weight: bold;
                padding: 5px;
                border-radius: 5px;
            }
            .sort-arrow {
                margin-left: 5px;
                font-size: 0.8em;
            }
        </style>
    </head>
    <body>
        <h1 id="resultTitle">網站檢查結果</h1>
        <button class="button-external" id="checkButtonExternal">執行網站檢查（外網）</button>
        <button class="button-internal" id="checkButtonInternal">執行網站檢查（內網）</button>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">網站<span class="sort-arrow" id="arrow-0"></span></th>
                    <th onclick="sortTable(1)">狀態<span class="sort-arrow" id="arrow-1"></span></th>
                    <th onclick="sortTable(2)">錯誤訊息<span class="sort-arrow" id="arrow-2"></span></th>
                    <th onclick="sortTable(3)">時間戳記<span class="sort-arrow" id="arrow-3"></span></th>
                </tr>
            </thead>
            <tbody>
                <!-- 檢查結果將顯示在這裡 -->
            </tbody>
        </table>

        <h3>執行紀錄</h3>
        <div id="log">
            <div id="logMessages"></div>
        </div>

        <script>
            const runCheck = async (direction) => {
                log("INFO", "開始執行網站狀態檢查");
                reset();
                try {
                    const response = await fetch(`/run-check?direction=${direction}`);
                    if (response.ok) {
                        const results = await response.json();
                        parseResult(results);
                    } else {
                        log("ERROR", `Error running check: ${response.statusText}`);
                    }
                } catch (error) {
                    log("ERROR", `Error running check: ${error.message}`);
                }
            };

            const parseResult = (results) => {
                if (!results) {
                    log("ERROR", "Error fetching results: results is null");
                    return;
                }

                const tbody = document.querySelector("#resultsTable tbody");
                tbody.innerHTML = ""; // 清空之前的結果

                results.forEach(({ url, status, message, timestamp }) => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                    <td><a href="${url}" target="_blank">${url}</a></td>
                    <td>${status}</td>
                    <td>${status === "ERROR" ? message : ""}</td>
                    <td>${timestamp || "N/A"}</td>
                `;
                    tbody.appendChild(row);
                    log("INFO", `網站：${url}, 檢查結果：${status}`);
                });

                const hasFailure = results.some((result) => result.status === "ERROR");
                const resultTitle = document.getElementById("resultTitle");
                resultTitle.textContent = `網站檢查結果：${hasFailure ? "失敗" : "成功"}`;
                resultTitle.className = hasFailure ? "status-failure" : "status-success";
            };

            const reset = () => {
                document.getElementById("resultTitle").className = "";
                document.getElementById("resultTitle").textContent = "網站檢查結果";
                document.getElementById("logMessages").innerHTML = "";
                document.querySelector("#resultsTable tbody").innerHTML = ""; // 清空之前的結果
            };

            const log = (status, message) => {
                const msg = `[${getCurrentTimestamp()}] [${status}] ${message}`;
                status === "ERROR" ? console.error(msg) : console.log(msg);
                document.getElementById("logMessages").innerHTML += `<div>${msg}</div>`;
            };

            const getCurrentTimestamp = () => {
                const now = new Date();
                return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, "0")}/${String(
                    now.getDate()
                ).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(
                    2,
                    "0"
                )}:${String(now.getSeconds()).padStart(2, "0")}`;
            };

            document.getElementById("checkButtonExternal").addEventListener("click", () => runCheck("E"));
            document.getElementById("checkButtonInternal").addEventListener("click", () => runCheck("I"));

            // 排序功能
            let sortOrder = [null, null, null, null];

            const sortTable = (columnIndex) => {
                const tbody = document.querySelector("#resultsTable tbody");
                const rows = Array.from(tbody.querySelectorAll("tr"));
                sortOrder[columnIndex] = sortOrder[columnIndex] === "asc" ? "desc" : "asc";

                rows.sort((a, b) => {
                    const aText = a.children[columnIndex].textContent.trim();
                    const bText = b.children[columnIndex].textContent.trim();
                    return sortOrder[columnIndex] === "asc" ? aText.localeCompare(bText) : bText.localeCompare(aText);
                });

                rows.forEach((row) => tbody.appendChild(row));
                updateSortArrows(columnIndex);
            };

            const updateSortArrows = (columnIndex) => {
                document.querySelectorAll(".sort-arrow").forEach((arrow, index) => {
                    arrow.textContent = "";
                });
                document.getElementById(`arrow-${columnIndex}`).textContent =
                    sortOrder[columnIndex] === "asc" ? " ▲" : " ▼";
            };
        </script>
    </body>
</html>
