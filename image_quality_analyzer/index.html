<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圖片壓縮品質分析工具</title>
    <style>
      /* 基礎樣式重置與變數 */
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --success: #16a34a;
        --success-bg: #f0fdf4;
        --success-border: #bbf7d0;
        --warning: #ca8a04;
        --warning-bg: #fefce8;
        --warning-border: #fef08a;
        --danger: #dc2626;
        --danger-bg: #fef2f2;
        --danger-border: #fecaca;
        --text-main: #1f2937;
        --text-sub: #4b5563;
        --bg-gradient-start: #eff6ff;
        --bg-gradient-end: #e0e7ff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-gradient-start),
          var(--bg-gradient-end)
        );
        min-height: 100vh;
        padding: 20px;
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .container {
        width: 100%;
        max-width: 900px;
        background: white;
        border-radius: 12px;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        padding: 2rem;
        margin-top: 2rem;
      }

      header {
        margin-bottom: 2rem;
      }
      h1 {
        font-size: 1.875rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        color: var(--text-sub);
      }

      .upload-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      @media (min-width: 768px) {
        .upload-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .upload-box {
        border: 2px dashed #d1d5db;
        border-radius: 0.5rem;
        padding: 1.5rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        background-color: #fff;
      }

      /* 新增：拖曳時的樣式 */
      .upload-box.drag-over {
        border-color: var(--primary);
        background-color: #eff6ff;
        transform: scale(1.02);
      }

      .upload-box:hover {
        border-color: var(--primary);
        background-color: #f8fafc;
      }
      .upload-box input {
        display: none;
      }
      .upload-icon {
        color: #9ca3af;
        width: 48px;
        height: 48px;
        margin-bottom: 0.75rem;
      }
      .upload-text {
        color: var(--primary);
        font-weight: 600;
        display: block;
        margin-bottom: 0.5rem;
      }
      .file-name {
        font-size: 0.875rem;
        color: var(--success);
        margin-top: 0.5rem;
        word-break: break-all;
        font-weight: 600;
      }

      .btn-analyze {
        width: 100%;
        background-color: var(--primary);
        color: white;
        padding: 0.75rem;
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .btn-analyze:hover {
        background-color: var(--primary-hover);
      }
      .btn-analyze:disabled {
        background-color: #d1d5db;
        cursor: not-allowed;
      }

      #resultsSection {
        display: none;
        margin-top: 2rem;
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .rating-card {
        padding: 1.5rem;
        border-radius: 0.5rem;
        border-width: 2px;
        border-style: solid;
        margin-bottom: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .rating-title {
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 0.25rem;
      }
      .rating-value {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 1.5rem;
        font-weight: 700;
      }
      .size-stat {
        text-align: right;
      }
      .size-percent {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      @media (min-width: 768px) {
        .metrics-grid {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }

      .metric-card {
        background: white;
        border: 2px solid;
        border-radius: 0.5rem;
        padding: 1.25rem;
      }
      .metric-card.psnr {
        border-color: #e9d5ff;
      }
      .metric-card.ssim {
        border-color: #c7d2fe;
      }
      .metric-card.mse {
        border-color: #fbcfe8;
      }

      .metric-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 0.5rem;
      }
      .metric-value {
        font-size: 1.875rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .psnr .metric-value {
        color: #9333ea;
      }
      .ssim .metric-value {
        color: #4f46e5;
      }
      .mse .metric-value {
        color: #db2777;
      }
      .metric-desc {
        font-size: 0.75rem;
        color: var(--text-sub);
      }

      .info-section {
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }
      .info-title {
        font-weight: 600;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        font-size: 0.875rem;
      }
      @media (min-width: 768px) {
        .info-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .suggestion-box {
        background-color: #eff6ff;
        border-left: 4px solid var(--primary);
        padding: 1.25rem;
        border-radius: 0.25rem;
        margin-bottom: 1.5rem;
      }
      .suggestion-text {
        font-size: 0.875rem;
        color: #1e40af;
        line-height: 1.5;
      }

      .glossary {
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1.25rem;
      }
      .glossary p {
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
        color: var(--text-sub);
      }
      .glossary strong {
        color: var(--text-main);
      }

      svg {
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📊 圖片壓縮品質分析工具</h1>
        <p class="subtitle">使用 PSNR、MSE、SSIM 指標量化分析圖片壓縮品質</p>
      </header>

      <div class="upload-grid">
        <label class="upload-box" id="dropZoneOriginal">
          <svg
            class="upload-icon"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
            ></path>
          </svg>
          <span class="upload-text">上傳原始圖片</span>
          <span style="font-size: 0.8rem; color: #666"
            >點擊或將圖片拖曳至此</span
          >
          <input type="file" accept="image/*" id="originalInput" />
          <p id="originalName" class="file-name"></p>
        </label>

        <label class="upload-box" id="dropZoneCompressed">
          <svg
            class="upload-icon"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
            ></path>
          </svg>
          <span class="upload-text">上傳壓縮圖片</span>
          <span style="font-size: 0.8rem; color: #666"
            >點擊或將圖片拖曳至此</span
          >
          <input type="file" accept="image/*" id="compressedInput" />
          <p id="compressedName" class="file-name"></p>
        </label>
      </div>

      <button id="analyzeBtn" class="btn-analyze" disabled>開始分析</button>

      <div id="resultsSection">
        <div id="ratingCard" class="rating-card">
          <div>
            <h3 class="rating-title">壓縮品質評級</h3>
            <div class="rating-value" id="ratingValue"></div>
          </div>
          <div class="size-stat">
            <p style="font-size: 0.875rem; color: var(--text-sub)">
              檔案大小減少
            </p>
            <p class="size-percent" id="sizeReduction">0%</p>
          </div>
        </div>

        <div class="metrics-grid">
          <div class="metric-card psnr">
            <h4 class="metric-label">PSNR（峰值訊噪比）</h4>
            <p class="metric-value" id="psnrValue">0 dB</p>
            <p class="metric-desc" id="psnrDesc">--</p>
          </div>
          <div class="metric-card ssim">
            <h4 class="metric-label">SSIM（結構相似性）</h4>
            <p class="metric-value" id="ssimValue">0</p>
            <p class="metric-desc" id="ssimDesc">--</p>
          </div>
          <div class="metric-card mse">
            <h4 class="metric-label">MSE（均方誤差）</h4>
            <p class="metric-value" id="mseValue">0</p>
            <p class="metric-desc" id="mseDesc">--</p>
          </div>
        </div>

        <div class="info-section">
          <h4 class="info-title">📁 檔案資訊</h4>
          <div class="info-grid">
            <div>
              <p>
                圖片尺寸：<span style="font-weight: 600" id="imgDimensions"
                  >-- x -- px</span
                >
              </p>
              <p>
                原始檔案：<span style="font-weight: 600" id="infoOrigSize"
                  >0 KB</span
                >
              </p>
            </div>
            <div>
              <p>
                壓縮後檔案：<span style="font-weight: 600" id="infoCompSize"
                  >0 KB</span
                >
              </p>
              <p>
                節省空間：<span
                  style="font-weight: 600; color: var(--success)"
                  id="infoSaved"
                  >0 KB</span
                >
              </p>
            </div>
          </div>
        </div>

        <div class="suggestion-box">
          <h4
            style="
              font-weight: 600;
              color: #1e3a8a;
              margin-bottom: 0.5rem;
              display: flex;
              align-items: center;
              gap: 0.5rem;
            "
          >
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            使用建議
          </h4>
          <div id="suggestionText" class="suggestion-text"></div>
        </div>
      </div>

      <div class="glossary">
        <h4 style="font-weight: 600; margin-bottom: 0.75rem">📚 指標說明</h4>
        <div>
          <strong>PSNR：</strong>
          <p>數值越高越好。40 dB 以上為優秀。</p>
        </div>
        <div>
          <strong>SSIM：</strong>
          <p>範圍 0-1。0.98 以上為極佳。</p>
        </div>
        <div>
          <strong>MSE：</strong>
          <p>數值越小越好。</p>
        </div>
      </div>
    </div>

    <script>
      // 狀態變數
      let originalFile = null;
      let compressedFile = null;
      const analyzeBtn = document.getElementById("analyzeBtn");

      // 統一處理檔案邏輯
      function handleFileSelection(file, type, nameId) {
        if (!file) return;

        // 檢查是否為圖片
        if (!file.type.startsWith("image/")) {
          alert("請上傳圖片檔案");
          return;
        }

        if (type === "original") originalFile = file;
        else compressedFile = file;

        const nameDisplay = document.getElementById(nameId);
        nameDisplay.textContent = `✓ ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;

        if (originalFile && compressedFile) {
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = "開始分析";
        }
      }

      // 設定拖曳與點擊上傳功能
      function setupInteraction(zoneId, inputId, nameId, type) {
        const dropZone = document.getElementById(zoneId);
        const input = document.getElementById(inputId);

        // 1. 處理點擊上傳 (Input change)
        input.addEventListener("change", (e) => {
          handleFileSelection(e.target.files[0], type, nameId);
        });

        // 2. 處理拖曳上傳 (Drag & Drop)
        // 必須阻止以下事件的預設行為，瀏覽器才不會直接開圖
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
          dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
          e.preventDefault();
          e.stopPropagation();
        }

        // 視覺回饋：當檔案拖曳進來時 highlight
        ["dragenter", "dragover"].forEach((eventName) => {
          dropZone.addEventListener(
            eventName,
            () => dropZone.classList.add("drag-over"),
            false,
          );
        });

        ["dragleave", "drop"].forEach((eventName) => {
          dropZone.addEventListener(
            eventName,
            () => dropZone.classList.remove("drag-over"),
            false,
          );
        });

        // 處理放開檔案 (Drop)
        dropZone.addEventListener("drop", (e) => {
          const dt = e.dataTransfer;
          const files = dt.files;
          handleFileSelection(files[0], type, nameId);
        });
      }

      // 初始化兩個上傳區
      setupInteraction(
        "dropZoneOriginal",
        "originalInput",
        "originalName",
        "original",
      );
      setupInteraction(
        "dropZoneCompressed",
        "compressedInput",
        "compressedName",
        "compressed",
      );

      // 核心分析按鈕
      analyzeBtn.addEventListener("click", async () => {
        if (!originalFile || !compressedFile) return;

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "分析中...";

        try {
          await performAnalysis();
          const results = document.getElementById("resultsSection");
          results.style.display = "block";
          results.scrollIntoView({ behavior: "smooth" });
        } catch (error) {
          alert(error.message);
        } finally {
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = "重新分析";
        }
      });

      // 載入圖片 Promise
      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const reader = new FileReader();
          reader.onload = (e) => {
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error("圖片載入失敗"));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error("檔案讀取失敗"));
          reader.readAsDataURL(file);
        });
      }

      function getImageData(img) {
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        return ctx.getImageData(0, 0, img.width, img.height);
      }

      function calculateMSE(data1, data2) {
        let sum = 0;
        const pixels = data1.length / 4;
        for (let i = 0; i < data1.length; i += 4) {
          const r = data1[i] - data2[i];
          const g = data1[i + 1] - data2[i + 1];
          const b = data1[i + 2] - data2[i + 2];
          sum += (r * r + g * g + b * b) / 3;
        }
        return sum / pixels;
      }

      function calculatePSNR(mse) {
        if (mse === 0) return Infinity;
        const maxPixelValue = 255;
        return 20 * Math.log10(maxPixelValue / Math.sqrt(mse));
      }

      function calculateSSIM(data1, data2, width, height) {
        const c1 = (0.01 * 255) ** 2;
        const c2 = (0.03 * 255) ** 2;

        let meanX = 0,
          meanY = 0,
          varX = 0,
          varY = 0,
          covar = 0;
        const pixels = width * height;

        for (let i = 0; i < data1.length; i += 4) {
          const gray1 = (data1[i] + data1[i + 1] + data1[i + 2]) / 3;
          const gray2 = (data2[i] + data2[i + 1] + data2[i + 2]) / 3;
          meanX += gray1;
          meanY += gray2;
        }
        meanX /= pixels;
        meanY /= pixels;

        for (let i = 0; i < data1.length; i += 4) {
          const gray1 = (data1[i] + data1[i + 1] + data1[i + 2]) / 3;
          const gray2 = (data2[i] + data2[i + 1] + data2[i + 2]) / 3;
          varX += (gray1 - meanX) ** 2;
          varY += (gray2 - meanY) ** 2;
          covar += (gray1 - meanX) * (gray2 - meanY);
        }
        varX /= pixels;
        varY /= pixels;
        covar /= pixels;

        return (
          ((2 * meanX * meanY + c1) * (2 * covar + c2)) /
          ((meanX ** 2 + meanY ** 2 + c1) * (varX + varY + c2))
        );
      }

      async function performAnalysis() {
        const img1 = await loadImage(originalFile);
        const img2 = await loadImage(compressedFile);

        if (img1.width !== img2.width || img1.height !== img2.height) {
          throw new Error(
            "兩張圖片的解析度（寬 x 高）必須完全相同，否則無法進行比對。",
          );
        }

        const data1 = getImageData(img1).data;
        const data2 = getImageData(img2).data;

        const mse = calculateMSE(data1, data2);
        const psnr = calculatePSNR(mse);
        const ssim = calculateSSIM(data1, data2, img1.width, img1.height);
        const reduction =
          ((originalFile.size - compressedFile.size) / originalFile.size) * 100;

        updateUI(mse, psnr, ssim, reduction, img1.width, img1.height);
      }

      function updateUI(mse, psnr, ssim, reduction, width, height) {
        document.getElementById("mseValue").textContent = mse.toFixed(2);
        document.getElementById("psnrValue").textContent =
          psnr === Infinity ? "無限大" : psnr.toFixed(2) + " dB";
        document.getElementById("ssimValue").textContent = ssim.toFixed(4);
        document.getElementById("sizeReduction").textContent =
          reduction.toFixed(2) + "%";

        document.getElementById("imgDimensions").textContent =
          `${width} × ${height} px`;
        document.getElementById("infoOrigSize").textContent =
          (originalFile.size / 1024).toFixed(2) + " KB";
        document.getElementById("infoCompSize").textContent =
          (compressedFile.size / 1024).toFixed(2) + " KB";
        document.getElementById("infoSaved").textContent =
          ((originalFile.size - compressedFile.size) / 1024).toFixed(2) + " KB";

        const ratingCard = document.getElementById("ratingCard");
        const ratingValue = document.getElementById("ratingValue");
        let qualityText = "",
          suggestionHTML = "";

        if (psnr >= 40 && ssim >= 0.98) {
          qualityText = "優秀 (Excellent)";
          ratingCard.style.backgroundColor = "var(--success-bg)";
          ratingCard.style.borderColor = "var(--success-border)";
          ratingValue.style.color = "var(--success)";
          suggestionHTML = `<p>✓ 適合所有裝置觀看，肉眼幾乎無差異。</p>`;
        } else if (psnr >= 35 && ssim >= 0.95) {
          qualityText = "良好 (Good)";
          ratingCard.style.backgroundColor = "#eff6ff";
          ratingCard.style.borderColor = "#bfdbfe";
          ratingValue.style.color = "var(--primary)";
          suggestionHTML = `<p>✓ 適合網路分享，細節保留良好。</p>`;
        } else if (psnr >= 30 && ssim >= 0.9) {
          qualityText = "可接受 (Acceptable)";
          ratingCard.style.backgroundColor = "var(--warning-bg)";
          ratingCard.style.borderColor = "var(--warning-border)";
          ratingValue.style.color = "var(--warning)";
          suggestionHTML = `<p>△ 適合手機小螢幕，大螢幕可見瑕疵。</p>`;
        } else {
          qualityText = "需改善 (Poor)";
          ratingCard.style.backgroundColor = "var(--danger-bg)";
          ratingCard.style.borderColor = "var(--danger-border)";
          ratingValue.style.color = "var(--danger)";
          suggestionHTML = `<p>✗ 品質損失明顯，建議調整壓縮參數。</p>`;
        }

        ratingValue.textContent = qualityText;
        document.getElementById("suggestionText").innerHTML = suggestionHTML;

        // 更新描述
        document.getElementById("psnrDesc").textContent =
          psnr >= 40 ? "✓ 優秀" : psnr >= 30 ? "△ 可接受" : "✗ 較差";
        document.getElementById("ssimDesc").textContent =
          ssim >= 0.98 ? "✓ 優秀" : ssim >= 0.9 ? "△ 可接受" : "✗ 較差";
        document.getElementById("mseDesc").textContent =
          mse <= 50 ? "✓ 優秀" : mse <= 200 ? "△ 可接受" : "✗ 差異大";
      }
    </script>
  </body>
</html>
