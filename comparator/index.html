<!doctype html>
<html lang="zh-Hant" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';"
    />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f4f8" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/public/comparator/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/public/comparator/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <title>單位比價</title>
    <script type="module" crossorigin src="/public/comparator/assets/index-skJFabOT.js"></script>
    <link rel="stylesheet" crossorigin href="/public/comparator/assets/index-DLirSfaC.css">
  <link rel="manifest" href="/public/comparator/manifest.webmanifest"></head>
  <body>
    <div id="app">
      <header>
        <h1>商品單位價格比較</h1>
      </header>

      <div class="container">
        <div class="comparator-grid">
          <div class="card" id="cardA">
            <h2><span class="card-badge">A</span>商品 A</h2>
            <div class="input-group">
              <label for="priceA">價格 (Price)</label>
              <input type="number" inputmode="decimal" id="priceA" placeholder="例如：100" autocomplete="off" />
            </div>
            <div class="input-group">
              <label for="unitA">單位數量與類別</label>
              <div class="unit-input-container">
                <input type="number" inputmode="decimal" id="unitA" placeholder="例如：500" autocomplete="off" />
                <select id="unitTypeA" aria-label="商品 A 單位類別">
                  <option value="g">公克 (g)</option>
                  <option value="kg">公斤 (kg)</option>
                  <option value="ml">毫升 (ml)</option>
                  <option value="L">公升 (L)</option>
                  <option value="pcs">個 / 入 (pcs)</option>
                </select>
              </div>
            </div>
            <div class="result-group">
              <label>單位價格</label>
              <div class="result-display">
                <span class="result-icon" id="iconA"></span>
                <div class="result-output" id="resultA">--</div>
              </div>
            </div>
          </div>

          <div class="vs-badge" aria-hidden="true">
            <span>VS</span>
          </div>

          <div class="card" id="cardB">
            <h2><span class="card-badge">B</span>商品 B</h2>
            <div class="input-group">
              <label for="priceB">價格 (Price)</label>
              <input type="number" inputmode="decimal" id="priceB" placeholder="例如：150" autocomplete="off" />
            </div>
            <div class="input-group">
              <label for="unitB">單位數量與類別</label>
              <div class="unit-input-container">
                <input type="number" inputmode="decimal" id="unitB" placeholder="例如：800" autocomplete="off" />
                <select id="unitTypeB" aria-label="商品 B 單位類別">
                  <option value="g">公克 (g)</option>
                  <option value="kg">公斤 (kg)</option>
                  <option value="ml">毫升 (ml)</option>
                  <option value="L">公升 (L)</option>
                  <option value="pcs">個 / 入 (pcs)</option>
                </select>
              </div>
            </div>
            <div class="result-group">
              <label>單位價格</label>
              <div class="result-display">
                <span class="result-icon" id="iconB"></span>
                <div class="result-output" id="resultB">--</div>
              </div>
            </div>
          </div>
        </div>
        <button id="resetBtn" title="清空所有欄位">清除</button>
      </div>

      <footer>
        <p>
          &copy; <span id="currentYear"></span> Zanta's Utilities
          <button id="themeToggleBtn" title="切換主題">🌙</button>
        </p>
      </footer>

      <div id="toast"></div>
    </div>
  </body>
</html>
