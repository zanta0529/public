<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shamir 祕密重建工具 (獨立版)</title>
    <style>
      :root {
        --purple-50: #f5f3ff;
        --purple-100: #ede9fe;
        --purple-200: #ddd6fe;
        --purple-400: #a78bfa;
        --purple-600: #7c3aed;
        --purple-700: #6d28d9;
        --purple-900: #4c1d95;
        --white-20: rgba(255, 255, 255, 0.2);
        --purple-border-30: rgba(167, 139, 250, 0.3);
        --focus-ring: rgba(167, 139, 250, 0.5);
        --purple-placeholder: rgba(221, 214, 254, 0.5);
        --red-600: #dc2626;
        --red-700: #b91c1c;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji',
          'Segoe UI Emoji';
        background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 100%);
        color: white;
        min-height: 100vh;
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 800px;
      }

      .header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .header-flex {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.025em;
      }

      .header p {
        color: var(--purple-200);
        margin-top: 0.5rem;
      }

      .card {
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid var(--purple-border-30);
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }

      .card h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* --- 佇列列表 --- */
      #shares-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .share-item {
        display: flex;
        gap: 0.5rem;
      }
      .share-item textarea {
        flex: 1 1 0%;
        padding: 0.75rem 1rem;
        background-color: var(--white-20);
        border: 1px solid var(--purple-border-30);
        border-radius: 0.5rem;
        color: white;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 0.875rem;
        line-height: 1.25rem;
        resize: none;
      }
      .share-item textarea::placeholder {
        color: var(--purple-placeholder);
      }
      .share-item textarea:focus {
        outline: 2px solid transparent;
        border-color: var(--purple-400);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }
      .share-item .remove-btn {
        padding: 0.5rem 0.75rem;
        background-color: var(--red-600);
        align-self: flex-start;
      }
      .share-item .remove-btn:hover {
        background-color: var(--red-700);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        color: white;
        transition: background-color 150ms cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
        cursor: pointer;
      }

      .btn-primary {
        background-color: var(--purple-600);
        padding: 0.75rem 1.5rem;
        width: 100%;
        font-size: 1rem;
      }
      .btn-primary:hover {
        background-color: var(--purple-700);
      }

      .btn-secondary {
        background-color: var(--white-20);
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
      }
      .btn-secondary:hover {
        background-color: rgba(255, 255, 255, 0.3);
      }

      /* --- 區塊樣式 --- */
      .output-box {
        display: none;
        padding: 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        margin-top: 1.25rem;
        word-break: break-all;
      }
      #error-block {
        background-color: rgba(220, 38, 38, 0.2);
        border: 1px solid rgba(220, 38, 38, 0.5);
        color: #fca5a5;
      }
      #result-block {
        background-color: rgba(16, 185, 129, 0.2);
        border: 1px solid rgba(16, 185, 129, 0.5);
        color: #6ee7b7;
      }
      #info-block {
        background-color: rgba(59, 130, 246, 0.2);
        border: 1px solid rgba(59, 130, 246, 0.5);
        color: #93c5fd;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
        font-size: 0.75rem;
      }
      .info-label {
        color: var(--purple-200);
        font-weight: 500;
      }

      .instructions-card ol {
        padding-left: 1.25rem;
        margin: 0;
        color: var(--purple-200);
        font-size: 0.875rem;
      }
      .instructions-card li {
        margin-bottom: 0.5rem;
      }
    </style>
    <script src="./sha256.min.js"></script>
    <script src="./cipher-core.iife.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-flex">
          <h1>Shamir 祕密重建工具</h1>
        </div>
        <p>獨立運行版 • 無需網路連線</p>
      </div>

      <div class="card">
        <h2>輸入分片 (Shares)</h2>
        <div id="shares-list"></div>
        <button id="add-share-btn" class="btn-secondary">＋ 新增分片輸入框</button>
      </div>

      <div class="card">
        <button id="reconstruct-btn" class="btn-primary">重建祕密</button>

        <div id="info-block" class="output-box">
          <div class="info-grid">
            <div><span class="info-label">版本:</span> <span id="info-version"></span></div>
            <div><span class="info-label">門檻值 (k):</span> <span id="info-k"></span></div>
            <div><span class="info-label">分片數 (n):</span> <span id="info-n"></span></div>
            <div><span class="info-label">使用 ID:</span> <span id="info-used-shares"></span></div>
          </div>
        </div>

        <div id="error-block" class="output-box"><strong>錯誤：</strong> <span id="error-message"></span></div>

        <div id="result-block" class="output-box">
          <div style="margin-bottom: 0.5rem"><span class="info-label">重建結果：</span></div>
          <div id="result-text" style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem"></div>
          <div><span class="info-label">HEX:</span> <span id="result-hex" style="font-family: monospace"></span></div>
        </div>
      </div>

      <div class="card instructions-card">
        <h2>使用說明</h2>
        <ol>
          <li>貼上至少 k 個 Base64 或 Base58Check 編碼的分片。</li>
          <li>系統會自動驗證分片完整性與校驗碼。</li>
          <li>點擊「重建祕密」即可還原原始資訊。</li>
        </ol>
      </div>
    </div>

    <script>
      const sharesList = document.getElementById('shares-list');
      const addShareBtn = document.getElementById('add-share-btn');
      const reconstructBtn = document.getElementById('reconstruct-btn');
      const infoBlock = document.getElementById('info-block');
      const errorBlock = document.getElementById('error-block');
      const resultBlock = document.getElementById('result-block');

      let shareCount = 0;

      function createShareInput() {
        shareCount++;
        const div = document.createElement('div');
        div.className = 'share-item';
        div.innerHTML = `
          <textarea rows="3" placeholder="貼上分片 ${shareCount}..." class="share-textarea"></textarea>
          ${shareCount > 2 ? '<button class="remove-btn" onclick="this.parentElement.remove()">移除</button>' : ''}
        `;
        sharesList.appendChild(div);
      }

      reconstructBtn.addEventListener('click', () => {
        errorBlock.style.display = 'none';
        resultBlock.style.display = 'none';
        infoBlock.style.display = 'none';

        try {
          const textareas = document.querySelectorAll('.share-textarea');
          const shares = Array.from(textareas)
            .map((t) => t.value.trim())
            .filter((v) => v !== '');

          if (shares.length < 2) throw new Error('請至少輸入 2 個分片');

          const parsedShares = shares.map((s, i) => {
            try {
              const obj = CipherCore.decodeShare(s);
              CipherCore.verifyChecksum(obj);
              return obj;
            } catch (e) {
              throw new Error(`分片 ${i + 1} 錯誤: ${e.message}`);
            }
          });

          const first = parsedShares[0];
          const k = first.k;

          if (parsedShares.length < k) throw new Error(`需要至少 ${k} 個分片才能重建`);

          document.getElementById('info-version').textContent = first.v;
          document.getElementById('info-k').textContent = first.k;
          document.getElementById('info-n').textContent = first.n;
          document.getElementById('info-used-shares').textContent = parsedShares.map((s) => s.id).join(', ');
          infoBlock.style.display = 'block';

          const adapter = new CipherCore.ShamirSecretsAdapter('', first.n, first.k);
          const secret = adapter.reconstructSecret(parsedShares.map((s) => ({ id: s.id, value: s.share })));

          document.getElementById('result-text').textContent = secret;
          const hex = Array.from(new TextEncoder().encode(secret))
            .map((b) => b.toString(16).padStart(2, '0'))
            .join('');
          document.getElementById('result-hex').textContent = hex;
          resultBlock.style.display = 'block';
        } catch (e) {
          document.getElementById('error-message').textContent = e.message;
          errorBlock.style.display = 'block';
        }
      });

      addShareBtn.addEventListener('click', createShareInput);
      createShareInput();
      createShareInput();
    </script>
  </body>
</html>
