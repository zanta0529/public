<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LiveABC Cheat! version 2</title>
        <meta name="robots" content="noindex,nofollow" />
        <style>
            * {
                font-family: Verdana, Arial;
            }

            .longText {
                width: 600px;
            }

            .shortText {
                width: 50px;
            }

            select {
                width: 120px;
            }

            a {
                color: blue;
                text-decoration: none;
            }

            a:hover {
                color: red;
                text-decoration: underline;
            }

            hr {
                height: 1px;
            }

            #btnAll {
                background-color: yellow;
            }

            #txtLog {
                width: 100%;
                height: 250px;
                font-size: 12px;
            }
        </style>
    </head>

    <body>
        <form id="LoginForm">
            <label>EP ID：</label><input type="text" id="SchoolID" name="SchoolID" /> | <label>UserID：</label
            ><input type="text" id="UserID" name="UserID" /> | <label>Password：</label
            ><input type="password" id="Password" name="Password" />
            <button type="button" id="OpenPageButton">開啟登入頁面</button>
            <input type="hidden" id="guid" name="guid" />
            <input type="hidden" name="button" value="LOGIN" />
        </form>

        <hr />

        <label>lessonId：</label><input type="text" id="lessonId" /> |
        <label
            >秒數設定： <label>最長（MAX）：</label
            ><input type="text" class="shortText" maxlength="2" id="maxSeconds" />（秒）| <label>最短（MIN）：</label
            ><input type="text" class="shortText" maxlength="2" id="minSeconds" />（秒）
            <button type="button" id="GenerateButton">產生網址</button>
        </label>

        <hr />

        <label>學習次數：</label><input type="text" id="addCountUrl" class="longText" readonly="true" />
        <input type="checkbox" id="remainOpened" />
        <label for="remainOpened">維持視窗開啟</label>
        <button type="button" id="AddCountButton">執行</button>

        <br />

        <label>學習時間：</label><input type="text" id="addDurationUrl" class="longText" readonly="true" />
        <label>自動執行</label> <input type="text" id="LoopTimes" class="shortText" maxlength="2" /> 次
        <button type="button" id="AddDurationButton">執行</button>

        <script>
            const progVersion = "2025/04/11";
            const loginUrl = "http://e-mobile.liveabc.com/Account/Login";
            const addCountUrl = "http://e-mobile.liveabc.com/Learning";
            const addDurationUrl = "http://e-mobile.liveabc.com/Record/Update";
            const pauseTime = 300;

            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("SchoolID").value = "";
                document.getElementById("UserID").value = "";
                document.getElementById("Password").value = "";
                document.getElementById("lessonId").value = 29102;
                document.getElementById("LoopTimes").value = 1;
                document.getElementById("maxSeconds").value = 60;
                document.getElementById("minSeconds").value = 57;

                document.getElementById("LoginForm").setAttribute("method", "post");
                document.getElementById("LoginForm").setAttribute("action", loginUrl);

                document.getElementById("OpenPageButton").addEventListener("click", () => {
                    window.open(loginUrl);
                });

                document.getElementById("GenerateButton").addEventListener("click", () => {
                    const lessonId = document.getElementById("lessonId").value;
                    document.getElementById("addCountUrl").value = `${addCountUrl}?lessonId=${lessonId}`;
                    document.getElementById("addDurationUrl").value = `${addDurationUrl}/${lessonId}`;
                });

                document.getElementById("AddCountButton").addEventListener("click", async () => {
                    document.getElementById("GenerateButton").click();
                    const countUrl = document.getElementById("addCountUrl").value;
                    const countObj = window.open(countUrl);
                    if (!document.getElementById("remainOpened").checked) {
                        await sleep(pauseTime);
                        countObj.close();
                    }
                });

                document.getElementById("AddDurationButton").addEventListener("click", async () => {
                    document.getElementById("GenerateButton").click();
                    const maxSeconds = parseInt(document.getElementById("maxSeconds").value);
                    const minSeconds = parseInt(document.getElementById("minSeconds").value);
                    const loopTimes = parseInt(document.getElementById("LoopTimes").value);
                    for (let i = 0; i < loopTimes; i++) {
                        const millis = `&_=${Date.now()}`;
                        const seconds = getRandomNumber(maxSeconds, minSeconds);
                        const durationUrl = `${
                            document.getElementById("addDurationUrl").value
                        }?time=${seconds}${millis}`;
                        const durationObj = window.open(durationUrl);
                        await sleep(pauseTime);
                        durationObj.close();
                    }
                });
            });

            const createGuid = () => {
                return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
                    const r = (Math.random() * 16) | 0;
                    return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
                });
            };

            const getRandomNumber = (maxNumber, minNumber) => {
                return Math.floor(Math.random() * (maxNumber - minNumber + 1)) + minNumber;
            };

            const sleep = (ms) => {
                return new Promise((resolve) => setTimeout(resolve, ms));
            };
        </script>
    </body>
</html>
